name: Sentinel AI CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./client/package-lock.json
      - name: Install dependencies
        working-directory: ./client
        run: npm ci
      # Vite Build ensures there are no critical React syntax errors
      - name: Build React App
        working-directory: ./client
        run: npm run build

  build-and-test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./server/package-lock.json
      - name: Install dependencies
        working-directory: ./server
        run: npm ci
      - name: Generate Prisma Client
        working-directory: ./server
        run: npx prisma generate
      # TypeScript compile checking
      - name: TypeScript Build
        working-directory: ./server
        run: npm run build

  docker-build-test:
    runs-on: ubuntu-latest
    needs: [build-and-test-frontend, build-and-test-backend]
    steps:
      - uses: actions/checkout@v3
      
      - name: Build Backend Docker Image
        run: docker build -t sentinel-ai-backend -f server/Dockerfile server/
      
      - name: Build Frontend Docker Image
        run: docker build -t sentinel-ai-frontend -f client/Dockerfile client/

      - name: Verify Compose Orchestration
        run: docker-compose config
