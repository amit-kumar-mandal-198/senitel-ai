server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # For React Router: if file isn't found, fallback to index.html
        try_files $uri $uri/ /index.html;
    }

    # Optional: proxy /api calls directly to backend if we don't want to bake localhost into the Vite build
    # location /api/ {
    #     proxy_pass http://backend:3000/;
    #     proxy_set_header Host $host;
    # }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
